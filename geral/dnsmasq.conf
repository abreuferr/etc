# Desativa DHCP completamente
no-dhcp-interface=*

# Não usa /etc/resolv.conf
no-resolv

# Domínio local
domain=particula.local

# DNS autoritativo para zona interna
server=/particula.local/192.168.1.10
server=/particula.local/192.168.1.11

# DNS para domínio VPN do NetBird — APENAS subdomínios internos
# NÃO inclui o domínio pai vpn.segi9.com (NetBird recusa com REFUSED)
server=/internal.vpn.segi9.com/100.79.248.251

# Bloqueia a expansão do search path para vpn.segi9.com
# Evita queries espúrias *.particula.local e *.internal.vpn.segi9.com
domain-needed

# DNS padrão: Pi-hole como primário
server=192.168.1.12

# Cache DNS
cache-size=1000

# TTL máximo
max-ttl=300

# Interfaces de escuta
listen-address=127.0.0.1
bind-dynamic

# Log
#log-queries
#log-facility=/var/log/dnsmasq.log
